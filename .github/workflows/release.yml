name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            os: ubuntu-latest
            artifact: BinSight-${{ github.ref_name }}-linux-x86_64.tar.gz
          - platform: windows-x86_64
            os: windows-latest
            artifact: BinSight-${{ github.ref_name }}-windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y qt6-base-dev

      - name: Install Qt on Windows
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.2"
          host: windows
          target: desktop
          arch: win64_msvc2022_64

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBINSIGHT_USE_LIEF=ON -DBINSIGHT_BUILD_GUI=AUTO

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure --verbose

      - name: GUI help smoke test
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            if [ -f ./build/Release/binsight-gui.exe ]; then
              ./build/Release/binsight-gui.exe --help
            fi
          else
            if [ -f ./build/binsight-gui ]; then
              ./build/binsight-gui --help
            fi
          fi

      - name: Package
        run: cpack --config build/CPackConfig.cmake -C Release

      - name: Normalize artifact name
        shell: bash
        run: |
          package="$(find . -maxdepth 1 \( -name 'BinSight-*.zip' -o -name 'BinSight-*.tar.gz' \) | head -n 1)"
          mv "$package" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ${{ matrix.artifact }}

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
