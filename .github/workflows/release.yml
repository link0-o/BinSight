name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            os: ubuntu-latest
            artifact: BinSight-${{ github.ref_name }}-linux-x86_64.tar.gz
          - platform: windows-x86_64
            os: windows-latest
            artifact: BinSight-${{ github.ref_name }}-windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y qt6-base-dev nlohmann-json3-dev

      - name: Install Qt on Windows
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.2"
          host: windows
          target: desktop
          arch: win64_msvc2022_64

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBINSIGHT_USE_LIEF=ON -DBINSIGHT_USE_ETW=AUTO -DBINSIGHT_BUILD_GUI=AUTO

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure --verbose

      - name: Report schema smoke test
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            binsight_bin="./build/Release/binsight.exe"
          else
            binsight_bin="./build/binsight"
          fi

          "$binsight_bin" scan "$binsight_bin" \
            --provider none \
            --rules-dir ./rules \
            --knowledge-dir ./knowledge \
            --out release-report.md \
            --json release-report.json \
            --report-lang zh-CN

          grep -q '"local_analysis"' release-report.json
          grep -q '"ai_analysis"' release-report.json
          grep -q '"final_assessment"' release-report.json

      - name: GUI help smoke test
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./build/Release/binsight.exe observe windows-etw --help
            if [ -f ./build/Release/binsight-gui.exe ]; then
              ./build/Release/binsight-gui.exe --help
            fi
          else
            if [ -f ./build/binsight-gui ]; then
              ./build/binsight-gui --help
            fi
          fi

      - name: Package
        run: cpack --config build/CPackConfig.cmake -C Release

      - name: Normalize artifact name
        shell: bash
        run: |
          package="$(find . -maxdepth 1 \( -name 'BinSight-*.zip' -o -name 'BinSight-*.tar.gz' \) | head -n 1)"
          mv "$package" "${{ matrix.artifact }}"

      - name: Validate Windows GUI runtime package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $entries = @(tar -tf "${{ matrix.artifact }}")
          if (-not ($entries | Select-String -SimpleMatch "Qt6Core.dll")) {
            throw "Windows package is missing Qt6Core.dll"
          }
          if (-not ($entries | Select-String -SimpleMatch "Qt6Widgets.dll")) {
            throw "Windows package is missing Qt6Widgets.dll"
          }
          if (-not ($entries | Select-String -Pattern "platforms[/\\]qwindows.dll")) {
            throw "Windows package is missing platforms/qwindows.dll"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ${{ matrix.artifact }}

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
