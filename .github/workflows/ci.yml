name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y qt6-base-dev nlohmann-json3-dev

      - name: Install Qt on Windows
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.2"
          host: windows
          target: desktop
          arch: win64_msvc2022_64

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBINSIGHT_USE_LIEF=ON -DBINSIGHT_USE_ETW=AUTO -DBINSIGHT_BUILD_GUI=AUTO

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure --verbose

      - name: Report schema smoke test
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            binsight_bin="./build/Release/binsight.exe"
          else
            binsight_bin="./build/binsight"
          fi

          "$binsight_bin" scan "$binsight_bin" \
            --provider none \
            --rules-dir ./rules \
            --knowledge-dir ./knowledge \
            --out ci-report.md \
            --json ci-report.json \
            --report-lang zh-CN

          grep -q '"local_analysis"' ci-report.json
          grep -q '"ai_analysis"' ci-report.json
          grep -q '"final_assessment"' ci-report.json

      - name: CLI help smoke test
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./build/Release/binsight.exe --help
            ./build/Release/binsight.exe observe windows-etw --help
            if [ -f ./build/Release/binsight-gui.exe ]; then
              ./build/Release/binsight-gui.exe --help
            fi
          else
            ./build/binsight --help
            if [ -f ./build/binsight-gui ]; then
              ./build/binsight-gui --help
            fi
          fi
